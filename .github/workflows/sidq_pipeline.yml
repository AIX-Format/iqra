name: 🕋 IQRA Sidq Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Run hourly to evolve
  workflow_dispatch:

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install openai requests

      - name: 🛡️ Verify No-Mock Integrity
        run: |
          # Check if any file contains "mock" in a way that suggests fake data
          # We exclude the test files that specifically test mocks (if any)
          grep -r "mock" lib/iqra | grep -v "test" && exit 1 || echo "✅ No mocks found in core lib."

      - name: 🚀 Expand Truth Oracle
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          python3 scripts/oracle/auto_expand.py

      - name: 🕋 Generate Sidq Dashboard
        run: |
          python3 scripts/dashboard/generate_report.py

      - name: 📤 Commit Changes (Oracle & Logs)
        run: |
          git config --local user.email "iqra@sovereign.ai"
          git config --local user.name "IQRA Sovereign Agent"
          git add iqra-core/ORACLE_DB.json iqra-core/benchmark_results.json docs-out/
          git commit -m "🧬 IQRA Evolution: Expanded Oracle and Updated Sidq Dashboard" || echo "No changes to commit"
          git push
