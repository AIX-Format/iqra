project:
  name: "IQRA"
  version: "1.1.0"
  description: "IQRA self-sovereign mission control config."

identity:
  fitrah: "iqra-core/FITRAH.md"
  dastur: "iqra-core/DASTUR.md"
  mithaq: "iqra-core/MITHAQ.md"
  muraqabah: "iqra-core/MURĀQABAH.md"

database:
  quran_d1: "iqra-core/data/quran_local.db"
  local_memory: ".iqra/memory.json"
  reward_ledger: "ledger/rewards.jsonl"

mission:
  mission_scope: "mission-scope.yml"
  missions_dir: "missions/"
  mission_control: "lib/iqra/sovereign_orchestrator.ts"
  execution_flow: "orchestrator/topological-loop.ts"

knowledge:
  root: "knowledge/"
  simulated: "knowledge/simulated/"

workers:
  - id: "Planner"
    active: true
    model: "gemini-1.5-pro"
  - id: "Researcher"
    active: true
    model: "gemini-1.5-flash"
  - id: "Builder"
    active: true
    model: "llama-3.1-70b"
  - id: "Validator"
    active: true
    model: "gemini-1.5-flash"
  - id: "Reporter"
    active: true
    model: "gpt-4.1"

simulation:
  enabled: true
  path: "knowledge/simulated/"
